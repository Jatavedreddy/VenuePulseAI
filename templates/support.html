{% extends "base.html" %}

{% block title %}VenuePulseAI – Contact Support{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center align-items-center animate-fade-up" style="min-height: 70vh;">
    <div class="card glass-panel border-0 p-4 shadow-lg" style="width: 100%; max-width: 500px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold"><i class="bi bi-headset me-2 vp-gradient-text"></i>Contact Support</h3>
            <p class="text-secondary small">Need help? Open a ticket and our team will assist you.</p>
        </div>
        
        <form method="POST" action="{{ url_for('support_submit') }}">
            <div class="mb-3 text-start">
                <label class="form-label text-secondary small fw-semibold">Subject</label>
                <input type="text" name="subject" class="form-control vp-select" placeholder="What do you need help with?" required>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label text-secondary small fw-semibold">Description</label>
                <textarea name="description" class="form-control vp-select" rows="5" placeholder="Please provide details about your issue..." required></textarea>
            </div>
            
            <button type="submit" class="btn vp-btn-primary w-100 mb-2">
                <i class="bi bi-send me-1"></i> Submit Ticket
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary w-100 border-0">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

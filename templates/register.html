{% extends "base.html" %}

{% block title %}VenuePulseAI – Register{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center align-items-center animate-fade-up delay-100" style="min-height: 70vh;">
    <div class="card glass-panel border-0 p-4 shadow-lg" style="width: 100%; max-width: 440px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold"><i class="bi bi-person-plus me-2 vp-gradient-text"></i>Create Account</h3>
            <p class="text-secondary small">Join the premium immersive venue platform.</p>
        </div>
        
        <form method="POST" action="{{ url_for('register') }}">
            <div class="mb-3 text-start">
                <label class="form-label text-secondary small fw-semibold">Username / Full Name</label>
                <input type="text" name="name" class="form-control vp-select" placeholder="Jane Doe" required>
            </div>
            
            <div class="mb-3 text-start">
                <label class="form-label text-secondary small fw-semibold">Email Address</label>
                <input type="email" name="email" class="form-control vp-select" placeholder="name@example.com" required>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label text-secondary small fw-semibold">Password</label>
                <input type="password" name="password" class="form-control vp-select" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn vp-btn-primary w-100 mb-4">
                Register Now
            </button>
            
            <div class="text-center">
                <span class="text-secondary small">
                    Already have an account? <a href="{{ url_for('login') }}" class="text-white text-decoration-none fw-semibold">Sign In</a>
                </span>
            </div>
        </form>
    </div>
</div>
{% endblock %}
